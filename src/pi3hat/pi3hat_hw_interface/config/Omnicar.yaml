controller_manager:
  ros__parameters:
    update_rate: 500 # hz tutto
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    state_broadcaster:
      type: pi3hat_state_broadcaster/Pi3Hat_State_Broadcaster
    joint_controller:
      type: pi3hat_joint_group_controller/Pi3Hat_Joint_Group_Controller
    omni_controller:
      type: omni_vel_controller/Omni_Vel_Controller
    forward_pos:
      type: forward_command_controller/ForwardCommandController
    distributor_state_broadcaster:
      type: distributor_state_broadcaster/Distributor_State_Broadcaster
    debug_broad:
      type: debug_broadcaster/Debug_Broadcaster
    imu_sensor:
       type: imu_sensor_broadcaster/IMUSensorBroadcaster

debug_broad:
  ros__parameters:
    joints:
      - "LF_WHEEL_JNT"
      - "RF_WHEEL_JNT"
      - "RH_WHEEL_JNT"
      - "LH_WHEEL_JNT"

state_broadcaster:
  ros__parameters:
    joints:
      - "LF_WHEEL_JNT"
      - "RF_WHEEL_JNT"
      - "RH_WHEEL_JNT"
      - "LH_WHEEL_JNT"
    second_encoders:
      - "LF_WHEEL_JNT"
      - "RF_WHEEL_JNT"
      - "RH_WHEEL_JNT"
      - "LH_WHEEL_JNT"
    performance_index: true
joint_controller:
  ros__parameters:
    joints:
      - "LF_WHEEL_JNT"
      - "RF_WHEEL_JNT"
      - "RH_WHEEL_JNT"
      - "LH_WHEEL_JNT"
    init_pos:
      - 0.0
      - 0.0
      - 0.0
      - 0.0

distributor_state_broadcaster:
  ros__parameters:
    distributors:
      - "Distributor_R"
      - "Distributor_L"
imu_sensor:
  ros__parameters:
    frame_id: imu_link
    sensor_name: Pi3Hat
    
omni_controller:
  ros__parameters:
    homing_duration: 5.0
    input_frequency: 100
    mecanum_angle: 135.0
    init_x_displacement: 0.0 #[m]
    init_height: -0.30
    max_height: -0.5
    min_height: -0.10
    wheel_rad: 0.05  #0.028 for trucks, 0.05 for omniwheels
    feet_type: 2  
    #kp_scale_default: 1  # solo per le ruote
    #kd_scale_default: 0.95  # solo per le ruote

