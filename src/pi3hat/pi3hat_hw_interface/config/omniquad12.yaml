controller_manager:
  ros__parameters:
    update_rate: 500

    state_broadcaster:
      type: pi3hat_state_broadcaster/Pi3HatStateBroadcaster

    distributor_state_broadcaster:
      type: distributor_state_broadcaster/DistributorStateBroadcaster

    debug_broadcaster:
      type: debug_broadcaster/DebugBroadcaster

    imu_sensor:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    joint_controller:
      type: pi3hat_joint_group_controller/Pi3HatJointGroupController

    omni_controller:
      type: omni_controller/OmniController

state_broadcaster:
  ros__parameters:
    joints:
      - "LF_HFE"
      - "LF_KFE"
      - "LH_HFE"
      - "LH_KFE"
      - "RF_HFE"
      - "RF_KFE"
      - "RH_HFE"
      - "RH_KFE"
      - "LF_WHEEL"
      - "LH_WHEEL"
      - "RF_WHEEL"
      - "RH_WHEEL"

    # second_encoders:
    #     - "LF_HFE"
    #     - "LF_KFE"
    #     - "LH_HFE"
    #     - "LH_KFE"
    #     - "RF_HFE"
    #     - "RF_KFE"
    #     - "RH_HFE"
    #     - "RH_KFE"

    performance_index: true

distributor_state_broadcaster:
  ros__parameters:
    distributors:
      - "Distributor_R"
      - "Distributor_L"

# TODO: verify the correct frame_id and sensor_name for the IMU
imu_sensor:
  ros__parameters:
    frame_id: imu_link
    sensor_name: Pi3Hat

    # sensor_name: "IMU"
    # frame_id: "IMU_NAV"

debug_broadcaster:
  ros__parameters:
    joints:
      - "LF_HFE"
      - "LF_KFE"
      - "LH_HFE"
      - "LH_KFE"
      - "RF_HFE"
      - "RF_KFE"
      - "RH_HFE"
      - "RH_KFE"
      - "RF_WHEEL"
      - "LF_WHEEL"
      - "LH_WHEEL"
      - "RH_WHEEL"

    # second_encoders:
    #   - "LF_HFE"
    #   - "LF_KFE"
    #   - "LH_HFE"
    #   - "LH_KFE"
    #   - "RF_HFE"
    #   - "RF_KFE"
    #   - "RH_HFE"
    #   - "RH_KFE"

joint_controller:
  ros__parameters:
    joints:
      - "LF_HFE"
      - "LF_KFE"
      - "LH_HFE"
      - "LH_KFE"
      - "RF_HFE"
      - "RF_KFE"
      - "RH_HFE"
      - "RH_KFE"
      - "LF_WHEEL"
      - "LH_WHEEL"
      - "RF_WHEEL"
      - "RH_WHEEL"

omni_controller:
  ros__parameters:
    wheel_joints:
      LF: LF_WHEEL
      LH: LH_WHEEL
      RF: RF_WHEEL
      RH: RH_WHEEL

    leg_joints:
      - LF_HFE
      - LF_KFE
      - LH_HFE
      - LH_KFE
      - RF_HFE
      - RF_KFE
      - RH_HFE
      - RH_KFE

    # distributor_names:
    #     - Distributor_R
    #     - Distributor_L

    # second_encoder_joints:
    #     - LF_HFE
    #     - LF_KFE
    #     - LH_HFE
    #     - LH_KFE
    #     - RF_HFE
    #     - RF_KFE
    #     - RH_HFE
    #     - RH_KFE

    # Transitions (rest / stand)
    rest_duration: 5.0
    stand_duration: 5.0
    joint_targets:
      LF_HFE: { q_rest: 0.0, q_stand: -0.56 }
      LF_KFE: { q_rest: 0.0, q_stand: 1.8 }
      LH_HFE: { q_rest: 0.0, q_stand: 0.56 }
      LH_KFE: { q_rest: 0.0, q_stand: -1.8 }
      RF_HFE: { q_rest: 0.0, q_stand: 0.56 }
      RF_KFE: { q_rest: 0.0, q_stand: -1.8 }
      RH_HFE: { q_rest: 0.0, q_stand: -0.56 }
      RH_KFE: { q_rest: 0.0, q_stand: 1.8 }

    # Wheel IK
    feet_type: mecanum
    wheel_rad: 0.05
    driveshaft_x: 0.235
    driveshaft_y: 0.188
    mecanum_angle: 135.0

    # Communication
    input_frequency: 100
    BestEffort_QOS: true

    # Features
    sim: false
    pub_odom: false
    pub_performance: true

    safety:
      enabled: true
      temp_warning_threshold: 50.0
      temp_critical_threshold: 57.0
      battery_min_voltage: 24.0
      temp_recovery_hysteresis: 5.0
      volt_recovery_hysteresis: 1.0
      ema_window_samples: 5000
      critical_strategy: "damping"
      damping_duration: 3.0
      legs_cmd_timeout: 0.5
