controller_manager:
    ros__parameters:
        update_rate: 500

        joint_state_broadcaster:
            type: joint_state_broadcaster/JointStateBroadcaster

        omni_controller:
            type: omni_controller/OmniController
        
        imu_sensor:
            type: imu_sensor_broadcaster/IMUSensorBroadcaster

imu_sensor:
    ros__parameters:
        frame_id: imu_link
        sensor_name: Pi3Hat

omni_controller:
    ros__parameters:
        wheel_joints:
            LF: LF_WHEEL_JNT
            LH: LH_WHEEL_JNT
            RF: RF_WHEEL_JNT
            RH: RH_WHEEL_JNT

        leg_joints:
            - LF_HIP_JNT
            - LF_KNEE_JNT
            - LH_HIP_JNT
            - LH_KNEE_JNT
            - RF_HIP_JNT
            - RF_KNEE_JNT
            - RH_HIP_JNT
            - RH_KNEE_JNT

        # distributor_names:
        #     - Distributor_R
        #     - Distributor_L

        # second_encoder_joints:
        #     - LF_HIP_JNT
        #     - LF_KNEE_JNT
        #     - LH_HIP_JNT
        #     - LH_KNEE_JNT
        #     - RF_HIP_JNT
        #     - RF_KNEE_JNT
        #     - RH_HIP_JNT
        #     - RH_KNEE_JNT

        # Homing
        homing_phases: [5.0]
        homing_config:
            LF_HIP_JNT:  {qi: 0.0, qf:  2.0}
            LF_KNEE_JNT: {qi: 0.0, qf: -1.0}
            LH_HIP_JNT:  {qi: 0.0, qf: -2.0}
            LH_KNEE_JNT: {qi: 0.0, qf:  1.0}
            RF_HIP_JNT:  {qi: 0.0, qf: -2.0}
            RF_KNEE_JNT: {qi: 0.0, qf:  1.0}
            RH_HIP_JNT:  {qi: 0.0, qf:  2.0}
            RH_KNEE_JNT: {qi: 0.0, qf: -1.0}
        
        # Wheel IK
        feet_type: mecanum
        wheel_rad: 0.05
        driveshaft_x: 0.235
        driveshaft_y: 0.188
        mecanum_angle: 135.0

        # Communication
        input_frequency: 100
        BestEffort_QOS: true

        # Features
        sim: false
        pub_odom: false
        pub_performance: true
