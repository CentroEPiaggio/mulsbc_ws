controller_manager:
  ros__parameters:
    update_rate: 500

    state_broadcaster:
      type: pi3hat_state_broadcaster/Pi3HatStateBroadcaster

    imu_sensor:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    omni_controller:
      type: omni_controller/OmniController

state_broadcaster:
  ros__parameters:
    joints:
      - "LF_WHEEL"
      - "LH_WHEEL"
      - "RF_WHEEL"
      - "RH_WHEEL"

imu_sensor:
  ros__parameters:
    frame_id: imu_link
    sensor_name: Pi3Hat

omni_controller:
  ros__parameters:
    wheel_joints:
      LF: LF_WHEEL
      LH: LH_WHEEL
      RF: RF_WHEEL
      RH: RH_WHEEL

    # leg_joints: #omitted — defaults to empty. Do NOT use "[]" (ROS 2 can't infer the type)
    #     - ...

    distributor_names:
      - Distributor_R
      - Distributor_L

    second_encoder_joints:
      - LF_WHEEL
      - LH_WHEEL
      - RF_WHEEL
      - RH_WHEEL

    feet_type: mecanum
    wheel_rad: 0.05
    driveshaft_x: 0.235
    driveshaft_y: 0.188
    mecanum_angle: 135.0

    input_frequency: 100
    BestEffort_QOS: true

    sim: false
    pub_odom: false
    pub_performance: true

    safety:
      enabled: true
      temp_warning_threshold: 50.0
      temp_critical_threshold: 57.0
      battery_min_voltage: 24.0
      temp_recovery_hysteresis: 5.0
      volt_recovery_hysteresis: 1.0
      ema_window_samples: 5000
      critical_strategy: "damping"
      damping_duration: 3.0
      legs_cmd_timeout: 0.5
