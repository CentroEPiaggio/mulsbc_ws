controller_manager:
  ros__parameters:
    update_rate: 800 # hz tutto
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    state_broadcaster:
      type: pi3hat_state_broadcaster/Pi3Hat_State_Broadcaster
    joint_controller:
      type: pi3hat_joint_group_controller/Pi3Hat_Joint_Group_Controller
    forward_pos:
      type: forward_command_controller/ForwardCommandController
    distributor_state_broadcaster:
      type: distributor_state_broadcaster/Distributor_State_Broadcaster

state_broadcaster:
  ros__parameters:
    joints:
      - "HIP"
      - "KNEE"
    second_encoders:
      -  "HIP"
    performance_index: true
joint_controller:
  ros__parameters:
    joints:
      - "HIP"
      - "KNEE"
forward_pos:
  ros__parameters:
    joints:
      - "PORCODIO_JOINT"
    interface_name: position
distributor_state_broadcaster:
  ros__parameters:
    distributors:
      - "PORCODIO_DIST"
