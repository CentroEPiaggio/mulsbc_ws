omni_vel_controller:
  ros__parameters:
    # -- Wheel joint names --
    # Override with the omniquad's wheel joint names.
    # Must match the joint names in the URDF / ros2_control hardware interface.
    wheel_names:
      - RF_WHEEL_JNT
      - LF_WHEEL_JNT
      - LH_WHEEL_JNT
      - RH_WHEEL_JNT

    # -- Kinematics --
    # Adjust these to match the omniquad's geometry.
    driveshaft_y: 0.188
    driveshaft_x: 0.235
    mecanum_angle: 135.0
    wheel_rad: 0.05

    # -- Communication --
    input_frequency: 100
    BestEffort_QOS: true

    # -- Features --
    pub_odom: false
    forward_height_rate: true  # forward height_rate from OmniMulinexCommand to ~/height_rate
                               # so the leg IK controller can consume it
    sim: false
