controller_manager:
  ros__parameters:
    update_rate: 500

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    omni_controller:
      type: omni_controller/OmniController

omni_controller:
  ros__parameters:
    # Wheel joints (mecanum: LF, LH, RF, RH)
    wheel_joints:
      LF: LF_WHEEL_JNT
      LH: LH_WHEEL_JNT
      RF: RF_WHEEL_JNT
      RH: RH_WHEEL_JNT

    # Leg joints (HFE + KFE per leg)
    leg_joints:
      - LF_HFE
      - LF_KFE
      - LH_HFE
      - LH_KFE
      - RF_HFE
      - RF_KFE
      - RH_HFE
      - RH_KFE

    # No power distributors
    distributor_names: []

    # No second encoders (sec_enc_transmission = 0.0 for all joints)
    second_encoder_joints: []

    # Wheel IK
    feet_type: mecanum
    wheel_rad: 0.05
    driveshaft_x: 0.235
    driveshaft_y: 0.188
    mecanum_angle: 135.0

    # Homing
    homing_phases: [5.0]
    homing_config:
      LF_HFE: {qi: 0.0, qf:  2.0}
      LF_KFE: {qi: 0.0, qf: -1.0}
      LH_HFE: {qi: 0.0, qf: -2.0}
      LH_KFE: {qi: 0.0, qf:  1.0}
      RF_HFE: {qi: 0.0, qf: -2.0}
      RF_KFE: {qi: 0.0, qf:  1.0}
      RH_HFE: {qi: 0.0, qf:  2.0}
      RH_KFE: {qi: 0.0, qf: -1.0}

    # Communication
    input_frequency: 100
    BestEffort_QOS: true

    # Features
    sim: false
    pub_odom: false
    pub_performance: true
